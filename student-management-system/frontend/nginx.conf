# ──────────────────────────────────────────────────────────────
# Nginx configuration for the Frontend container
# ──────────────────────────────────────────────────────────────
#
# Two jobs:
#   1. Serve static files (HTML / CSS / JS) from /usr/share/nginx/html
#   2. Reverse-proxy any /api/* requests to the backend container
#
# WHY reverse proxy?
#   The frontend JavaScript uses relative URLs like /api/students.
#   The browser sends those requests to whatever host is serving
#   the page (nginx on port 80).  Nginx then forwards them to the
#   backend container on port 3000 inside the Docker network.
#   The browser never needs to know the backend's address.
# ──────────────────────────────────────────────────────────────

server {
    listen 80;

    # ── Serve static frontend files ───────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Fallback to index.html for single-page apps
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to the backend container ──────────────
    # "backend" is the service name defined in docker-compose.yml.
    # Docker's internal DNS resolves it to the backend container's IP.
    location /api/ {
        proxy_pass         http://backend:3000;

        # Forward the real client IP to the backend
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
